<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>


<h1>hola, este es un curso mejor de js</h1>




    <script>
        let nombre = prompt("cual es tu nombre?")//es como un input
            alert("hola " + nombre) //informacion del navegador

        let numero = 10
        let numero2 = 5
        let numero3 = 6
        numero += 5
        //un signo al lado de igual opera el resultado y guarda el resultado en la variable
        document.write(numero + "<br>")//document.write es para escribir en html

        numero -= 3
        document.write(numero + "<br>")//12  
        
        numero -- 
        document.write(numero + "<br>")//11
        
        numero ++ 
        document.write(numero + "<br>")//12

        numero = -numero
        document.write(numero + "<br>")//-12

        numero =  numero3 / numero2
        document.write(numero + "<br>")// -2

        numero =  numero3 & numero
        document.write(numero + "<br>")

        numero = numero2 * numero3
        document.write(numero + "<br>")

        numero ** 5
        document.write(numero + "<br>")
        //br es un salto de linea en el html

        numero--//resta 1 a numero
        numero++//suma 1 a numero
        -numero//negativo
        numero / numero2//divide 
        numero&numero2// sirve para comparar
        numero * numero2
        numero**2//eleva 

        //comparadores

        let nUmero = 5
        let nUmero2 = 10
        document.write(nUmero == nUmero2 + "<br>")
        document.write(nUmero != nUmero2 + "<br>")//niega la comparacion y devuelve true si no son iguales
        document.write(nUmero === nUmero2 + "<br>")//compara valor y tipo de dato
        document.write(nUmero !== nUmero2 + "<br>")//niega la comparacion de valor y tipo de dato
        document.write(nUmero < nUmero2 + "<br>")
        document.write(nUmero > nUmero2 + "<br>")
        document.write(nUmero <= nUmero2 + "<br>")
        document.write(nUmero >= nUmero2 + "<br>")

        num1 = 54
        num2 = 13

        resultado = num1 < num2
        resultado2 = num1 > num2
        document.write(resultado || resultado2)
        document.write(resultado && resultado2)
        document.write(!resultado)

    </script>
</body>
</html>
