<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        saludo = "hola sebas"
        respuesta = "que haces?"

        respuesta = saludo + " " + respuesta
        document.write(respuesta)

        numero1 = 5;
        numero2 = 8;

        resultado = " " + numero1 + numero2//las comillas vacias sirven para convertir numeros a texto
        document.write(resultado)

        numero1_2 = "20";
        numero2_1 = 9;

        resultado1 = numero1_2.concat(numero2_1)//.concat() se usa para concatenar cadenas de texto solo funciona si hay un string
        document.write(resultado1)

        nombre = "sebas"
        accion = "escribiendo un pequeño codigo"
        mostrar = `${nombre} esta ${accion}`
        document.write(mostrar)
        
        
    </script>
</body>
</html>
